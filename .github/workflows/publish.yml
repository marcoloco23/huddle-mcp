name: Publish

# Publishes to npm when you cut a GitHub Release. No interactive 2FA: set an
# npm *automation* token as the NPM_TOKEN repo secret (Settings → Secrets and
# variables → Actions). Bump package.json version before tagging the release.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm run build
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
